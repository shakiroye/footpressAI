  <text x="94" y="474" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">Azure OpenAI</text>
  <text x="94" y="489" text-anchor="middle" fill="#6b7280" font-size="9">GPT-4.1-mini</text>
  <text x="94" y="502" text-anchor="middle" fill="#6b7280" font-size="9">text-embedding-3-small</text>
  <text x="94" y="516" text-anchor="middle" fill="#4b5563" font-size="8">Génération · RAG · Eval</text>
  <text x="94" y="524" text-anchor="middle" fill="#1d4ed8" font-size="8">swedencentral</text>

  <!-- Service : Language -->
  <rect x="178" y="452" width="140" height="76" rx="10" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="178" y="452" width="140" height="5" rx="4" fill="url(#azureGrad)"/>
  <text x="248" y="474" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">AI Language</text>
  <text x="248" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Résumé extractif</text>
  <text x="248" y="502" text-anchor="middle" fill="#6b7280" font-size="9">NER · Sentiment</text>
  <text x="248" y="516" text-anchor="middle" fill="#4b5563" font-size="8">Opinion mining</text>
  <text x="248" y="524" text-anchor="middle" fill="#1d4ed8" font-size="8">swedencentral · F0</text>

  <!-- Service : Vision -->
  <rect x="332" y="452" width="140" height="76" rx="10" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="332" y="452" width="140" height="5" rx="4" fill="url(#azureGrad)"/>
  <text x="402" y="474" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">AI Vision</text>
  <text x="402" y="489" text-anchor="middle" fill="#6b7280" font-size="9">OCR (READ)</text>
  <text x="402" y="502" text-anchor="middle" fill="#6b7280" font-size="9">Tags · Classification</text>
  <text x="402" y="516" text-anchor="middle" fill="#4b5563" font-size="8">Images de matchs</text>
  <text x="402" y="524" text-anchor="middle" fill="#1d4ed8" font-size="8">swedencentral · F0</text>

  <!-- Service : AI Search -->
  <rect x="486" y="452" width="140" height="76" rx="10" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="486" y="452" width="140" height="5" rx="4" fill="url(#azureGrad)"/>
  <text x="556" y="474" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">AI Search</text>
  <text x="556" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Index vectoriel HNSW</text>
  <text x="556" y="502" text-anchor="middle" fill="#6b7280" font-size="9">1536-dim embeddings</text>
  <text x="556" y="516" text-anchor="middle" fill="#4b5563" font-size="8">Top-K retrieval</text>
  <text x="556" y="524" text-anchor="middle" fill="#1d4ed8" font-size="8">footpresssearch · Free</text>

  <!-- Service : Blob Storage -->
  <rect x="640" y="452" width="140" height="76" rx="10" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="640" y="452" width="140" height="5" rx="4" fill="url(#azureGrad)"/>
  <text x="710" y="474" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">Blob Storage</text>
  <text x="710" y="489" text-anchor="middle" fill="#6b7280" font-size="9">PDFs journalistes</text>
  <text x="710" y="502" text-anchor="middle" fill="#6b7280" font-size="9">user_id/filename.pdf</text>
  <text x="710" y="516" text-anchor="middle" fill="#4b5563" font-size="8">Isolation multi-user</text>
  <text x="710" y="524" text-anchor="middle" fill="#1d4ed8" font-size="8">footpressstorage</text>

  <!-- Service : Monitoring -->
  <rect x="794" y="452" width="82" height="76" rx="10" fill="#1e293b" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="794" y="452" width="82" height="5" rx="4" fill="url(#greenGrad)"/>
  <text x="835" y="471" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">Monitoring</text>
  <text x="835" y="485" text-anchor="middle" fill="#6b7280" font-size="8">Métriques</text>
  <text x="835" y="497" text-anchor="middle" fill="#6b7280" font-size="8">in-memory</text>
  <text x="835" y="509" text-anchor="middle" fill="#4b5563" font-size="8">/metrics</text>
  <text x="835" y="521" text-anchor="middle" fill="#16a34a" font-size="8">BONUS</text>

  <!-- ═══════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════ -->
  <rect x="24" y="556" width="852" height="50" rx="8" fill="#0f172a" stroke="#1f2937" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="44" y1="581" x2="74" y2="581" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="80" y="585" fill="#9ca3af" font-size="10">Requête client</text>

  <line x1="178" y1="581" x2="208" y2="581" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="214" y="585" fill="#9ca3af" font-size="10">Appel interne</text>

  <rect x="320" y="573" width="10" height="10" rx="2" fill="#0078d4"/>
  <text x="335" y="585" fill="#9ca3af" font-size="10">Service Azure</text>

  <rect x="432" y="573" width="10" height="10" rx="2" fill="#16a34a"/>
