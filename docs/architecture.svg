<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowGreen">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#16a34a" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1f2937"/>
  </pattern>
  <rect width="900" height="620" fill="url(#dots)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f9fafb" font-size="18" font-weight="700">⚽ FootPress AI — Architecture</text>
  <text x="450" y="56" text-anchor="middle" fill="#6b7280" font-size="11">FastAPI · Azure OpenAI · Azure AI Language · Azure AI Vision · Azure AI Search · Azure Blob Storage</text>

  <!-- ═══════════════════════════════ -->
  <!-- LAYER 1 : CLIENT -->
  <!-- ═══════════════════════════════ -->
  <text x="24" y="94" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="2">CLIENT</text>
  <line x1="70" y1="90" x2="876" y2="90" stroke="#1f2937" stroke-width="1"/>

  <!-- Nuxt 4 Frontend -->
  <rect x="24" y="100" width="160" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="100" width="160" height="6" rx="5" fill="url(#greenGrad)"/>
  <text x="104" y="126" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="700">🖥️ Nuxt 4</text>
  <text x="104" y="143" text-anchor="middle" fill="#9ca3af" font-size="10">Frontend · Railway</text>
  <text x="104" y="157" text-anchor="middle" fill="#6b7280" font-size="9">localhost:3000</text>

  <!-- Swagger UI -->
  <rect x="204" y="100" width="160" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="204" y="100" width="160" height="6" rx="5" fill="#1d4ed8"/>
  <text x="284" y="126" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="700">📄 Swagger UI</text>
  <text x="284" y="143" text-anchor="middle" fill="#9ca3af" font-size="10">Auto-doc FastAPI</text>
  <text x="284" y="157" text-anchor="middle" fill="#6b7280" font-size="9">/docs</text>

  <!-- Arrow client → API Gateway -->
  <line x1="184" y1="132" x2="390" y2="220" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <line x1="364" y1="132" x2="420" y2="220" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

