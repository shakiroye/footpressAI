  <text x="735" y="357" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">⚙️ Défi 3 — Pipeline</text>
  <text x="735" y="372" text-anchor="middle" fill="#6b7280" font-size="9">/generate-article · /check-coherence</text>
