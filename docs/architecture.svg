  <!-- LAYER 2 : API GATEWAY -->
  <!-- ═══════════════════════════════ -->
  <text x="24" y="206" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="2">API GATEWAY</text>
  <line x1="110" y1="202" x2="876" y2="202" stroke="#1f2937" stroke-width="1"/>

  <!-- FastAPI box -->
  <rect x="330" y="214" width="240" height="74" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2" filter="url(#glowGreen)"/>
  <text x="450" y="240" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="800">⚡ FastAPI</text>
  <text x="450" y="258" text-anchor="middle" fill="#86efac" font-size="10">footpress-api.up.railway.app</text>
  <rect x="346" y="265" width="62" height="16" rx="4" fill="#166534"/>
  <text x="377" y="276" text-anchor="middle" fill="#86efac" font-size="9">CORS</text>
  <rect x="414" y="265" width="72" height="16" rx="4" fill="#166534"/>
  <text x="450" y="276" text-anchor="middle" fill="#86efac" font-size="9">Monitoring</text>
  <rect x="492" y="265" width="72" height="16" rx="4" fill="#166534"/>
  <text x="528" y="276" text-anchor="middle" fill="#86efac" font-size="9">API Key Auth</text>

  <!-- ═══════════════════════════════ -->
  <!-- LAYER 3 : ROUTERS -->
  <!-- ═══════════════════════════════ -->
  <text x="24" y="322" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="2">ROUTERS</text>
  <line x1="84" y1="318" x2="876" y2="318" stroke="#1f2937" stroke-width="1"/>

  <!-- Arrow FastAPI → Routers -->
  <line x1="390" y1="288" x2="170" y2="336" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="450" y1="288" x2="450" y2="336" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="510" y1="288" x2="720" y2="336" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Router Défi 1 -->
  <rect x="60" y="334" width="210" height="72" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="334" width="210" height="5" rx="4" fill="url(#blueGrad)"/>
  <text x="165" y="357" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">🎯 Défi 1 — AI Playground</text>
  <text x="165" y="372" text-anchor="middle" fill="#6b7280" font-size="9">POST /api/v1/analyze/</text>
  <text x="165" y="387" text-anchor="middle" fill="#4b5563" font-size="9">Détection auto : text · image · query</text>
  <text x="165" y="399" text-anchor="middle" fill="#4b5563" font-size="9">router_service → orchestration</text>

  <!-- Router Défi 2 -->
  <rect x="345" y="334" width="210" height="72" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="345" y="334" width="210" height="5" rx="4" fill="url(#purpleGrad)"/>
  <text x="450" y="357" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">📚 Défi 2 — RAG Archives</text>
  <text x="450" y="372" text-anchor="middle" fill="#6b7280" font-size="9">POST /rag/upload · /rag/query</text>
  <text x="450" y="387" text-anchor="middle" fill="#4b5563" font-size="9">PDF → chunks → embed → index</text>
  <text x="450" y="399" text-anchor="middle" fill="#4b5563" font-size="9">Vector search · Top-K retrieval</text>

  <!-- Router Défi 3 -->
  <rect x="630" y="334" width="210" height="72" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
