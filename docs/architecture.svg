  <line x1="165" y1="406" x2="250" y2="454" stroke="#374151" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="450" y1="406" x2="430" y2="454" stroke="#374151" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="450" y1="406" x2="590" y2="454" stroke="#374151" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="735" y1="406" x2="735" y2="454" stroke="#374151" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="735" y1="406" x2="820" y2="454" stroke="#374151" stroke-width="1" marker-end="url(#arrowGray)"/>

